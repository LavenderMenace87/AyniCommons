<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ayni Commons — Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --clay:#8B5E3C;--soil:#3D2410;--adobe:#C4956A;--sand:#E8D5B7;
  --cream:#F5EFE4;--parchment:#FAF6EF;--sage:#7A8C6E;--moss:#4A5E3A;
  --stone:#9E8E7A;--charcoal:#2E2A25;--ember:#A0522D;--gold:#B8963E;
  --mist:#D4CFC7;--rule:rgba(140,94,60,0.15);--red:#8B2A1A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--parchment);color:var(--charcoal);font-family:'Jost',sans-serif;font-weight:300;font-size:15px;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{background:var(--soil);padding:14px 16px 12px;flex-shrink:0}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--sand);line-height:1}
.hdr-title em{font-style:italic;color:var(--adobe)}
.hdr-sub{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,213,183,0.4);margin-top:3px}
.mode-row{display:flex;gap:6px;margin-top:12px}
.mbtn{flex:1;font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;padding:8px 4px;border:1px solid rgba(232,213,183,0.2);background:transparent;color:rgba(232,213,183,0.4);cursor:pointer;border-radius:3px;transition:all 0.15s}
.mbtn.active{background:var(--adobe);border-color:var(--adobe);color:white}

/* ── CATEGORY CHIPS ── */
.chips-wrap{background:var(--cream);border-bottom:1px solid var(--rule);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;scrollbar-width:none}
.chips-wrap::-webkit-scrollbar{display:none}
.chips{display:flex;gap:6px;padding:10px 12px;white-space:nowrap}
.chip{font-size:11px;font-weight:500;letter-spacing:0.08em;padding:6px 12px;border-radius:20px;border:1.5px solid var(--mist);background:white;color:var(--stone);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.chip.active{background:var(--charcoal);border-color:var(--charcoal);color:white}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── SORT + SEARCH BAR ── */
.bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--cream);border-bottom:1px solid var(--rule);flex-shrink:0}
.search{flex:1;background:white;border:1px solid var(--mist);border-radius:6px;padding:7px 10px;font-family:'Jost',sans-serif;font-size:13px;color:var(--charcoal);outline:none}
.search::placeholder{color:var(--mist)}
.sort-btn{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:7px 10px;background:white;border:1px solid var(--mist);border-radius:6px;color:var(--stone);cursor:pointer;font-family:'Jost',sans-serif;white-space:nowrap;flex-shrink:0}
.sort-btn.active{background:var(--charcoal);border-color:var(--charcoal);color:white}

/* ── TASK LIST ── */
.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.group-head{background:var(--cream);padding:8px 16px;font-size:9px;letter-spacing:0.35em;text-transform:uppercase;color:var(--stone);font-weight:500;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px}
.group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.group-count{margin-left:auto;font-size:10px;color:var(--mist)}

/* ── TASK CARD ── */
.task{border-bottom:1px solid var(--rule);background:white;cursor:pointer;transition:background 0.1s}
.task:active{background:rgba(196,149,106,0.06)}
.task.open{background:white}
.task-head{display:flex;align-items:center;gap:0;padding:0}
.task-stripe{width:4px;flex-shrink:0;align-self:stretch;border-radius:0}
.task-main{flex:1;padding:13px 12px 13px 12px;min-width:0}
.task-name{font-size:13px;color:var(--charcoal);line-height:1.35;font-weight:400}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:3px;letter-spacing:0.04em;font-weight:500}
.tag-time{background:var(--cream);color:var(--stone);border:1px solid var(--mist)}
.tag-critical{background:rgba(139,42,26,0.1);color:var(--red)}
.tag-bad{background:rgba(139,42,26,0.08);color:var(--red)}
.tag-dur{background:rgba(122,140,110,0.1);color:var(--moss)}
.task-chevron{padding:13px 14px;color:var(--mist);font-size:12px;flex-shrink:0;transition:transform 0.2s}
.task.open .task-chevron{transform:rotate(180deg);color:var(--clay)}

/* ── TASK BODY ── */
.task-body{display:none;padding:0 16px 16px 16px;border-top:1px solid var(--rule)}
.task.open .task-body{display:block}
.task-desc{font-size:13px;color:var(--charcoal);line-height:1.7;margin-top:12px}
.task-note{margin-top:10px;background:var(--cream);border-left:3px solid var(--adobe);padding:10px 12px;font-size:12px;color:var(--stone);line-height:1.5;font-style:italic}
.task-bad{margin-top:8px;background:rgba(139,42,26,0.05);border-left:3px solid var(--red);padding:10px 12px;font-size:12px;color:var(--red);line-height:1.5}
.task-bad::before{content:"⚠ Bad Luck: "}
.task-deps{margin-top:10px}
.task-deps-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--stone);margin-bottom:5px}
.dep-pill{display:inline-block;font-size:10px;padding:2px 6px;background:var(--cream);border:1px solid var(--mist);color:var(--stone);border-radius:3px;margin:2px}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 24px;color:var(--stone)}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-text{font-size:13px;line-height:1.6}

/* ── BOTTOM SUMMARY ── */
.summary-bar{background:var(--soil);padding:10px 16px;display:flex;gap:0;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.05)}
.sum-item{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,0.08)}
.sum-item:last-child{border-right:none}
.sum-val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--sand)}
.sum-label{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(232,213,183,0.4);margin-top:1px}

/* ── PROGRESS INDICATOR ── */
.progress-wrap{height:2px;background:rgba(255,255,255,0.08);flex-shrink:0}
.progress-bar{height:100%;background:var(--adobe);transition:width 0.3s}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title"><em>Ayni</em> Commons</div>
  <div class="hdr-sub">Build Planner · 496 CR 5152 · Concho AZ</div>
  <div class="mode-row">
    <button class="mbtn active" onclick="setMode('realistic')" id="mb-realistic">Realistic</button>
    <button class="mbtn" onclick="setMode('optimistic')" id="mb-optimistic">Best Case</button>
    <button class="mbtn" onclick="setMode('badluck')" id="mb-badluck">Bad Luck</button>
  </div>
</div>

<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="chips-wrap">
  <div class="chips" id="chips"></div>
</div>

<div class="bar">
  <input class="search" type="search" placeholder="Search tasks…" oninput="onSearch(this.value)" id="searchInput">
  <button class="sort-btn active" onclick="setSort('time')" id="sb-time">By Time</button>
  <button class="sort-btn" onclick="setSort('cat')" id="sb-cat">By Type</button>
</div>

<div class="list" id="taskList"></div>

<div class="summary-bar" id="summaryBar"></div>

<script>
const CATS={
  admin:    {label:'Pre-Purchase & Legal',color:'#9E8E7A',icon:'🏛️'},
  water:    {label:'Water Systems',       color:'#3A6B68',icon:'💧'},
  energy:   {label:'Energy Systems',      color:'#B8963E',icon:'⚡'},
  soil:     {label:'Soil & Land',         color:'#6B8E4E',icon:'🌱'},
  fungal:   {label:'Fungal Hub',          color:'#7A5C8A',icon:'🍄'},
  livestock:{label:'Livestock',           color:'#4A5E3A',icon:'🐐'},
  food:     {label:'Food Production',     color:'#5C8A6E',icon:'🥬'},
  structures:{label:'Structures',         color:'#8B5E3C',icon:'🏗️'},
  creative: {label:'Creative & Studios',  color:'#6B5B8A',icon:'🎨'},
  revenue:  {label:'Revenue Streams',     color:'#B8963E',icon:'💰'},
  grants:   {label:'Grants & Admin',      color:'#2E6DA4',icon:'📋'},
  community:{label:'Community Pipeline',  color:'#A0522D',icon:'👥'},
};

// [id, cat, name, description, month_start, duration_months, critical, deps, bad_luck_note, bad_luck_delay_months, field_note]
const T=[
['a01','admin','Hire water rights attorney','Apache County water rights are complex. A water attorney reviews the APN before you spend money on anything else. Cost: $500–1,500 for a consultation.',-5,1,true,[],'Attorney finds a pending water rights dispute on the parcel. 6-week resolution delay and $800 extra.',0.5,'Research Arizona water attorneys before anything else'],
['a02','admin','Call ADWR — water rights on APN','Arizona Dept. of Water Resources: 602-771-8500. Verify groundwater rights, any adjudications, well permit status. Free call, critical information.',-5,0.5,true,[],'Well permit not properly transferred. Requires re-filing. 3 weeks + $300.',0,'Do before any purchase commitment'],
['a03','admin','Independent water test','Test for uranium, arsenic, PFAS, nitrates, pH, coliform. Arizona-certified lab. Results take 2–3 weeks. Non-negotiable.',-4.5,0.5,true,[],'High uranium and arsenic detected. Whole-house RO required — $1,800 upgrade.',1,'Apache County aquifers can contain uranium and arsenic'],
['a04','admin','SAM.gov registration','Required for REAP, VAPG, and other USDA programs. Free but takes 7–10 business days to activate. Do this months before you need it.',-5,0.5,false,[],'System glitch delays activation 3 weeks. File early.',0,'UEI number required for federal grants'],
['a05','admin','FSA pre-appointment research','Read the FSA Beginning Farmer microloan guidelines. Gather tax returns or IRS non-filing letters (free at irs.gov), ID, any prior farm income records.',-4,1,true,[],'',0,'IRS non-filing letter takes 5 minutes at irs.gov'],
['a06','admin','EQIP pre-application — NRCS contact','Contact local NRCS office. Understand what practices qualify for Apache County. EQIP must be filed before any earthwork — this is not optional.',-4,0.5,true,[],'',0,'File before a single shovel goes in the ground'],
['a07','admin','FSA appointment — file both microloans','Bring: condensed plan, full business plan, IRS letters or tax returns, ID. File Ownership Microloan + Operating Microloan simultaneously. Both on one visit.',-3,0.5,true,['a05','a06'],'Loan officer requests additional documentation. Second appointment needed. 3-week delay.',3,'Critical path: land acquisition waits on this'],
['a08','admin','REAP application filed','Before solar panels are ordered or installed. 25% grant on system cost. File with USDA Rural Development.',-3,0.5,false,[],'Missed application window. Pay full price for solar. $2,500–4,000 lost.',0,'File before ordering any solar equipment'],
['a09','admin','Owner financing negotiation','Contact seller for terms. Typical: 10–20% down, 5–8% interest, 10–20 year amortization. Get terms in writing before FSA closing.',-4,2,false,[],'Seller wants full price before FSA closes. Bridge financing needed.',1,'Reduces FSA loan dependency if successful'],
['a10','admin','Title search + survey','Hire title company. Confirm APN boundary for partial parcel. Confirm no liens, easements, or access issues.',-2,1,true,[],'Easement for utility access found on southwest corner. Adjusts layout.',0.5,'Partial parcel APN requires careful boundary review'],
['a11','admin','LLC formation','Register LLC in Arizona. Operating agreement drafted. This is the entity that holds the FSA loan.',-3,1,true,[],'State filing backlog. 3-week delay. Use expedited filing ($50 extra).',0,'Must be done before closing'],
['a12','admin','Community covenant — legal draft','Work with attorney to draft the covenant as a binding legal document. Four-tier pathway, ownership obligations, protected participant provisions.',-2,2,false,[],'',0,'This is the document people sign when they arrive'],
['a13','admin','Land closing — Day 0','Keys in hand. FSA funds disbursed. Remediation begins today.',0,0.5,true,['a07','a10','a11'],'Partial APN split causes county delay. Closing pushed 6 weeks.',6,'Everything before this is pre-purchase'],
['a14','admin','Starlink installation','Order before closing. Delivery takes 2–4 weeks. Rural internet is non-negotiable for remote work income and HipCamp management.',0,1,true,[],'Equipment backordered 6 weeks. Run on phone hotspot.',0,'Order before closing day'],
['w01','water','Well assessment + pump test','Hire a licensed well contractor to assess pump condition, flow rate, and water depth. Budget $300–600. Do on Day 1.',0,0.5,true,[],'Pump failing. Replacement: $1,200–2,200.',1,'Do on Day 1 — everything depends on water'],
['w02','water','RO system installed','Reverse osmosis for drinking and cooking water. Addresses uranium, arsenic, PFAS. Size for household + WWOOF household.',0.5,0.5,true,['w01'],'High arsenic requires whole-house system. $1,800 upgrade.',0,'Match spec to water test results'],
['w03','water','Cistern (2,000 gallon)','Primary water storage. Gravity-fed where possible. Positioned for gravity flow to washing areas and garden zones.',1,1,false,['w01'],'',0,'Gravity flow eliminates pump dependency'],
['w04','water','Contour survey for swale placement','Walk the land with an A-frame level. Mark swale locations on every significant contour. This is the water harvesting design — do before any earthwork.',0.5,1,true,[],'',0,'A-frame level costs $20 to build'],
['w05','water','Primary swales — mule + hand tools','Build first 3–5 on-contour swales on key slopes. Mule-drawn blade for bulk, hand shaping for spillways.',2,3,false,['w04'],'Monsoon season: work morning hours only July–September. Add 3 weeks.',2,'These fill in the first monsoon rain'],
['w06','water','Half-moon berms around food forest trees','Small crescent earthworks around each tree. Capture rainwater at root zone. Hand work, fast and cheap.',3,2,false,['w05'],'',0,'Major yield for minimal effort'],
['w07','water','Primary pond excavated','Main water storage + habitat + chinampa pond. Rent mini excavator 2–3 days. Shape banks for chinampa attachment points.',5,2,true,[],'Rock shelf at 5 ft. Extra excavator day + $600. 2-week delay.',2,'Largest single earthwork on the property'],
['w08','water','Infiltration ponds excavated','2–3 shallow spreading basins that sink water into the aquifer. Less depth, more surface area than storage pond.',6,2,false,['w04'],'Monsoon timing may delay if July–September.',2,'Recharges the well over years'],
['w09','water','Filtration pond planted','Downstream of animal areas. Planted with bulrush, cattail, water hyacinth. Reed beds filter within 6–8 weeks.',7,1,false,['w07'],'',0,'Plant in warm season for fast establishment'],
['w10','water','Rain chains installed','From every roof edge into cisterns or rock drip pools. Order before structures are roofed.',6,1,false,[],'',0,'Cheap, beautiful, functional'],
['w11','water','Fog net assessment + installation','Walk the property at dawn for 2 weeks. Find where fog condenses. Install stainless mesh panels on T-posts.',3,1,false,[],'',0,'Free water. Takes observation first.'],
['w12','water','Greywater cascade system','Sauna + shower graywater through planted biofilter beds (willow, comfrey, elderberry) then into orchard swales.',8,2,false,[],'',0,'Install with first permanent structures'],
['w13','water','Hugelkultur beds — Phase 1','Bury juniper logs from clearing under mounded beds. Underground water reservoirs — reduce irrigation 60–80% once established.',3,3,false,['soil03'],'',0,'Logs rot slowly; moisture released for years'],
['w14','water','Olla irrigation — key beds','Unglazed clay pots buried near roots, filled every 1–2 weeks. Near-zero evaporation. The cheapest drip system available.',5,1,false,[],'',0,'Make or buy; works for trees and shrubs'],
['e01','energy','Solar array + battery bank','After REAP grant confirmation. Size for community use and growth. Hire licensed solar contractor.',1,1.5,true,['a08'],'Panel delivery delayed 5 weeks. Run on generator. $400 in fuel.',3,'REAP reduces cost 25%'],
['e02','energy','Generator + fuel bridge','Running backup until solar is operational. Keep 30 gallons diesel on hand.',0,0.5,true,[],'',0,'Bridge power until solar installed'],
['e03','energy','Wind site assessment','Record wind speed + direction for 4 weeks using a simple anemometer ($50). Identify turbine placement.',2,1,false,[],'',0,'Apache County wind is real at 6,200 ft'],
['e04','energy','Small wind turbine installed','After site assessment confirms viability. 1–3 kW turbine on 30-ft tower. Feeds same battery bank as solar.',5,1,false,['e03'],'Turbine controller fault. Warranty repair — 3 weeks down.',2,'Complements solar on cloudy and winter days'],
['e05','energy','Rocket mass heater — communal kitchen','First RMH in communal kitchen. Salvaged firebrick, cob surround, thermal mass bench. Heats the space 12–18 hrs on a small wood bundle.',6,2,false,['str03'],'Firebrick backorder 3 weeks. Use salvaged brick.',0,'Most efficient wood heat available'],
['e06','energy','Biogas digester installed','Sized for goat + pig manure + kitchen scraps. Flexible membrane type. Produces cooking gas + liquid fertilizer.',7,2,false,['liv10','liv01'],'Fitting leak week 2. Fix takes 10 days. Minor.',0,'Eliminates propane for cooking permanently'],
['e07','energy','Passive solar design — all structures','Every structure sited with solar gain calculation. South-facing, correct overhang. This is design work, zero cost.',-2,1,false,[],'',0,'Zero cost when designed in from the start'],
['soil01','soil','Baseline soil test — 5 zones','Send samples to university extension lab. Get organic matter %, pH, nutrients, texture. This is what everything else measures against.',0,0.5,true,[],'',0,'Arizona Cooperative Extension; $20–40/sample'],
['soil02','soil','Site map + zone design (1–5)','Walk all 40 acres. Map: fence lines, slopes, drainage, sun/wind exposure, soil variations, existing trees. Design permaculture zones 1–5.',0.5,1,true,[],'',0,'Zone 1 nearest the home; Zone 5 is the wild edge'],
['soil03','soil','Juniper clearing — Phase 1','Priority: clear from home area, food forest zone, firebreak perimeter. Chainsaw + mule haul. All material processed: timber, biochar, wood chips.',1,6,false,[],'More juniper than expected. Hire day labor 3 days. $300.',0,'The clearing is the raw material for building and biochar'],
['soil04','soil','Native grass reseeding after clearing','Blue grama, sideoats grama, black-eyed Susan. Seed immediately after clearing before invasives colonize.',2,1,false,['soil03'],'',0,'$50–120 in seed; timing is critical'],
['soil05','soil','Three-bin compost system established','Hot compost: goat manure, kitchen scraps, wood chips, crop residues. Turn weekly. First finished compost in 8–12 weeks.',2,1,true,[],'',0,'Start before animals arrive so you are ready'],
['soil06','soil','Biochar retort kiln built','Salvaged 55-gallon steel drums + pipe fittings. Burns juniper clearing waste to produce biochar.',3,1,false,['soil03'],'',0,'Convert the problem (juniper) into an asset (biochar)'],
['soil07','soil','Biochar charged + first application','Soak fresh biochar in compost tea 2 weeks before applying. Apply to food forest zone first.',4,1,false,['soil06'],'',0,'Charged biochar has active biology, not just carbon'],
['soil08','soil','Year 1 end soil test — compare to baseline','Quantify organic matter gain. First data point for the teaching platform. Publish results.',12,0.5,false,['soil01'],'',0,'This is the proof of concept in numbers'],
['soil09','soil','Cover crop — winter seeding','Austrian winter peas, winter rye, crimson clover. Seeded in October. Fixed nitrogen + soil protection.',9,1,false,[],'',0,'Free fertility; plant every fall'],
['soil10','soil','Pollinator corridors planted','Native wildflower strips along fence lines, pond edges, food forest perimeter.',5,2,false,['food03'],'',0,'Habitat for beneficial insects; also beautiful'],
['fun01','fungal','Below-grade hub site selected','Between walipini and food forest, partial shade, accessible. Mark footprint. Check for underground utilities.',2,0.5,true,[],'',0,'Must connect physically to walipini'],
['fun02','fungal','Hub excavated + built','4 ft deep × 8×10 ft trench. Earthbag walls, earthen floor, corrugated roof covered with soil. Ventilation pipe. Access hatch.',3,2,true,['fun01'],'Caliche layer. Extra hand work. 1 week added.',1,'Below grade for thermal stability'],
['fun03','fungal','Six-barrel fertility system installed','6 × 55-gallon food-grade barrels labeled: AA, FPJ, IMO, compost tea, mycorrhizal inoculant, wood chip habitat. Plumbed drains.',4.5,1,true,['fun02'],'',0,'This is the farm\'s complete fertility program'],
['fun04','fungal','AA — Fish Amino Acids, first batch','Tilapia scraps + sorghum syrup (brown sugar Year 1). Layer 1:1. Seal. Ferment 2–4 weeks. Dilute 1:500 for high-nitrogen liquid feed.',5,0.5,true,['fun03'],'',0,'Cost $0 — tilapia scraps already on site'],
['fun05','fungal','FPJ — Fermented Plant Juice, first batch','Fresh comfrey + sorghum syrup. Pack and press. Strain after 1 week. Growth hormones and enzymes for foliar spray.',5,0.5,false,['fun03','food05'],'',0,'Plant comfrey first; takes 6–8 weeks to establish'],
['fun06','fungal','IMO collection — Indigenous Microorganisms','Find white mycelium on forest floor at dawn. Colonize cooked rice for 3–5 days. Mix with sugar. Culture and multiply.',3,1,true,[],'',0,'You are amplifying biology already adapted to your land'],
['fun07','fungal','Compost tea brewing setup','Air pump + 5-gallon bucket. Steep compost + forest soil + duck pond water 24–48 hrs. Apply immediately.',5,0.5,false,['soil05','liv05'],'',0,'Duck pond water is already teeming with biology'],
['fun08','fungal','Mycorrhizal inoculant — apply at planting','Glomus species. Once per planting hole for all trees and perennials. Year 1 only — self-perpetuating forever after.',4,1,true,[],'',0,'Only purchased input in the whole fertility program'],
['fun09','fungal','Wood chip habitat laid — all beds','Cedar and juniper chips 4–6 inches deep on all beds and food forest. Never tilled in. Permanent.',4,2,false,['soil03'],'',0,'Mycorrhizal networks live in this layer — do not disturb'],
['fun10','fungal','Satellite inoculant stations — individual walipinis','Small secondary chambers connected to main hub by buried pipe. Each member walipini gets its own satellite.',18,3,false,['fun03'],'',0,'Built when individual walipinis are built (Tier 3)'],
['liv01','livestock','Predator-proof chicken + rabbit housing built','Hardware cloth on all sides including floor. Roost bars. Nest boxes. Raccoon-proof latch. Build this before animals arrive.',1,2,true,[],'Predator breach Month 3. Lost 6 hens. Rebuild with hardware cloth floor. $180 + birds.',0,'Hardware cloth is not optional'],
['liv02','livestock','Chickens acquired (15–20 + rooster)','Heritage dual-purpose breeds: Plymouth Rock, Rhode Island Red, Black Australorp. Tested healthy.',1.5,0.5,true,['liv01'],'First order out of stock. 3-week wait.',0,'Heritage breeds for eggs and meat'],
['liv03','livestock','Rabbits — breeding colony started','New Zealand White or Californian. 2 does + 1 buck. First litter in 30 days. Manure goes direct to beds.',1.5,0.5,false,['liv01'],'',0,'Fastest protein production per sq ft available'],
['liv04','livestock','Mule sourced and acquired','Draft mule, 14–16 hands. Proven for work — not green. Collar, harness, traces, single tree, blade attachment.',1,1,false,[],'Finding good working mules takes time. Allow 6 weeks.',2,'Worth paying for proven temperament'],
['liv05','livestock','Ducks acquired (10–15)','Khaki Campbell for eggs, Muscovy for meat and insect control. Integrate into pond system once pond is ready.',4,0.5,false,['w07'],'',0,'Pond must exist first'],
['liv06','livestock','Geese acquired (4–6)','African or Toulouse. Grass management, alarm system, meat.',4.5,0.5,false,['w07'],'',0,'Best alarm system on the farm'],
['liv07','livestock','Quail colony setup','Coturnix quail. Wire housing, deep bedding. Egg production at 6 weeks. 50 birds = ~40 eggs/day.',1.5,0.5,false,[],'Snake gets in Month 2. Hardware cloth on the bottom.',0,'Low management, high yield'],
['liv08','livestock','Black soldier fly colony','Starter culture in ventilated bin. Feed kitchen waste, spent substrate, manure. Self-sustaining in 4–6 weeks. Larvae fed to poultry and fish.',2,0.5,false,[],'',0,'Free protein; eliminates fly breeding in waste'],

let MODE='realistic';
let FILTER='all';
let SORT='time';
let QUERY='';
let openId=null;

const DELAYS={realistic:0,optimistic:-0.3,badluck:1.5};

function ts(t){ let s=t[4]; if(MODE==='badluck'&&t[8])s+=(t[9]||1); if(MODE==='optimistic')s=Math.max(s-0.3,t[4]-0.5); return s; }
function td(t){ let d=t[5]; if(MODE==='badluck'&&t[8])d+=(t[9]||0.5); return d; }
function tLabel(s){ return s<0?`Pre-${Math.abs(Math.round(s))} mo`:s===0?'At closing':`Month ${Math.ceil(s)}`; }

function buildChips(){
  const cats=Object.entries(CATS);
  let h=`<div class="chip ${FILTER==='all'?'active':''}" onclick="setFilter('all')"><div class="chip-dot" style="background:#9E8E7A"></div>All <span style="opacity:0.5;font-size:9px">${T.length}</span></div>`;
  cats.forEach(([k,c])=>{
    const n=T.filter(t=>t[1]===k).length;
    h+=`<div class="chip ${FILTER===k?'active':''}" onclick="setFilter('${k}')" id="chip-${k}">
      <div class="chip-dot" style="background:${c.color}"></div>${c.icon} ${c.label.split(' ')[0]} <span style="opacity:0.5;font-size:9px">${n}</span>
    </div>`;
  });
  document.getElementById('chips').innerHTML=h;
}

function filtered(){
  let tasks=T.filter(t=>(FILTER==='all'||t[1]===FILTER));
  if(QUERY) tasks=tasks.filter(t=>t[2].toLowerCase().includes(QUERY)||t[3].toLowerCase().includes(QUERY));
  if(SORT==='time') tasks=[...tasks].sort((a,b)=>ts(a)-ts(b));
  return tasks;
}

function renderList(){
  const tasks=filtered();
  if(!tasks.length){
    document.getElementById('taskList').innerHTML=`<div class="empty"><div class="empty-icon">🌵</div><div class="empty-text">No tasks match your search.<br>Try a different filter or keyword.</div></div>`;
    updateSummary(0,0);
    return;
  }

  let html='',lastGroup=null;

  if(SORT==='cat'){
    const groups={};
    tasks.forEach(t=>{ if(!groups[t[1]])groups[t[1]]=[]; groups[t[1]].push(t); });
    Object.entries(groups).forEach(([cat,ctasks])=>{
      const info=CATS[cat];
      html+=`<div class="group-head"><div class="group-dot" style="background:${info.color}"></div>${info.icon} ${info.label}<span class="group-count">${ctasks.length}</span></div>`;
      ctasks.forEach(t=>html+=taskCard(t));
    });
  } else {
    // Sort by time — group by phase
    tasks.forEach(t=>{
      const s=ts(t);
      const phase=s<0?'Pre-Purchase':s<1?'Month 0 — Closing':s<4?'Months 1–3':s<7?'Months 4–6':s<10?'Months 7–9':s<13?'Months 10–12':s<19?'Year 2 (Months 13–18)':s<25?'Year 2 Late (Months 19–24)':'Year 3+';
      if(phase!==lastGroup){
        html+=`<div class="group-head">${phase}</div>`;
        lastGroup=phase;
      }
      html+=taskCard(t);
    });
  }

  document.getElementById('taskList').innerHTML=html;
  updateSummary(tasks.length, tasks.filter(t=>t[6]).length);
}

function taskCard(t){
  const s=ts(t);
  const d=td(t);
  const hasBad=MODE==='badluck'&&t[8];
  const isOpen=openId===t[0];
  const note=t[10]?`<div class="task-note">${t[10]}</div>`:'';
  const badNote=hasBad?`<div class="task-bad">${t[8]}</div>`:'';
  const deps=t[7]&&t[7].length?t[7].map(id=>{const dt=T.find(x=>x[0]===id);return dt?`<span class="dep-pill">${dt[2]}</span>`:''}).join(''):'';
  const depsHtml=deps?`<div class="task-deps"><div class="task-deps-label">Depends on</div>${deps}</div>`:'';
  return `<div class="task${isOpen?' open':''}" id="task-${t[0]}" onclick="toggleTask('${t[0]}')">
    <div class="task-head">
      <div class="task-stripe" style="background:${CATS[t[1]].color}"></div>
      <div class="task-main">
        <div class="task-name">${t[2]}</div>
        <div class="task-meta">
          <span class="tag tag-time">${tLabel(s)}</span>
          <span class="tag tag-dur">${Math.round(d*10)/10} mo</span>
          ${t[6]?'<span class="tag tag-critical">Critical</span>':''}
          ${hasBad?'<span class="tag tag-bad">⚠ delayed</span>':''}
        </div>
      </div>
      <div class="task-chevron">▾</div>
    </div>
    <div class="task-body">
      <div class="task-desc">${t[3]}</div>
      ${badNote}${note}${depsHtml}
    </div>
  </div>`;
}

function toggleTask(id){
  openId=openId===id?null:id;
  renderList();
  if(openId){
    setTimeout(()=>{
      const el=document.getElementById('task-'+id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}

function updateSummary(count,critical){
  const criticalMonth=T.filter(t=>t[6]).map(t=>ts(t)).filter(s=>s>=0).sort((a,b)=>a-b)[0]||0;
  document.getElementById('summaryBar').innerHTML=`
    <div class="sum-item"><div class="sum-val">${count}</div><div class="sum-label">Tasks</div></div>
    <div class="sum-item"><div class="sum-val">${critical}</div><div class="sum-label">Critical</div></div>
    <div class="sum-item"><div class="sum-val">${MODE==='badluck'?T.filter(t=>t[8]).length:0}</div><div class="sum-label">Bad Luck</div></div>
    <div class="sum-item"><div class="sum-val">42</div><div class="sum-label">Mo Span</div></div>
  `;
  const pct=count/T.length*100;
  document.getElementById('progressBar').style.width=pct+'%';
}

function setMode(m){
  MODE=m;
  ['realistic','optimistic','badluck'].forEach(x=>document.getElementById('mb-'+x).classList.toggle('active',x===m));
  openId=null;
  renderList();
}

function setFilter(f){
  FILTER=f;
  openId=null;
  buildChips();
  renderList();
  // Scroll chips to show active
  setTimeout(()=>{
    const el=document.getElementById('chip-'+f);
    if(el) el.scrollIntoView({behavior:'smooth',inline:'nearest',block:'nearest'});
  },50);
}

function setSort(s){
  SORT=s;
  document.getElementById('sb-time').classList.toggle('active',s==='time');
  document.getElementById('sb-cat').classList.toggle('active',s==='cat');
  openId=null;
  renderList();
}

function onSearch(q){
  QUERY=q.toLowerCase();
  openId=null;
  renderList();
}

buildChips();
renderList();
</script>
</body>
</html>
